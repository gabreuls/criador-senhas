name: Continuos Delivery
on:
    push:
        branches:
            - main 

jobs:
    delivery:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository code
              uses: actions/checkout@v4  

            - name: Simulando Continuos Delivery
              uses: actions/upload-artifact@v7
              with:
                name: projeto.zip
                path: |
                    main.py
                    README.md